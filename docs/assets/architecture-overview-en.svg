<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Haituo Codex Project architecture overview</title>
  <desc id="desc">Vector architecture diagram showing operator rules, Amazon evidence, local tools, Dianxiaomi automation, gated save, and readback.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#335c81"/>
    </marker>
    <style>
      .title{font:700 30px Segoe UI,Arial,sans-serif;fill:#14213d}
      .subtitle{font:500 15px Segoe UI,Arial,sans-serif;fill:#415a77}
      .box{fill:#ffffff;stroke:#8ecae6;stroke-width:2;rx:14}
      .gate{fill:#fff3bf;stroke:#f59f00;stroke-width:2}
      .stop{fill:#ffe3e3;stroke:#e03131;stroke-width:2;rx:14}
      .ok{fill:#e6fcf5;stroke:#0ca678;stroke-width:2;rx:14}
      .label{font:600 16px Segoe UI,Arial,sans-serif;fill:#102a43}
      .small{font:400 12px Segoe UI,Arial,sans-serif;fill:#486581}
      .line{stroke:#335c81;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#e03131;stroke-width:2;fill:none;stroke-dasharray:6 5;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="60" y="55" class="title">Haituo Codex Project</text>
  <text x="60" y="82" class="subtitle">Gated Dianxiaomi automation: evidence first, live actions only after explicit authorization</text>

  <rect x="60" y="130" width="190" height="82" class="box"/>
  <text x="82" y="164" class="label">Operator / Codex</text>
  <text x="82" y="188" class="small">reads task boundary</text>

  <rect x="300" y="130" width="230" height="82" class="box"/>
  <text x="322" y="160" class="label">Rules and Safety Gate</text>
  <text x="322" y="184" class="small">TASK, AGENT, skills, audit</text>

  <rect x="80" y="300" width="220" height="90" class="box"/>
  <text x="108" y="334" class="label">Amazon Pages</text>
  <text x="108" y="358" class="small">candidate, image, price context</text>

  <rect x="360" y="300" width="230" height="90" class="box"/>
  <text x="388" y="334" class="label">Crawlbox Userscript</text>
  <text x="388" y="358" class="small">ASIN dedupe and batch prep</text>

  <rect x="650" y="300" width="230" height="90" class="box"/>
  <text x="678" y="334" class="label">Local Evidence Tools</text>
  <text x="678" y="358" class="small">risk, price, category, reports</text>

  <rect x="930" y="300" width="210" height="90" class="box"/>
  <text x="957" y="334" class="label">Config and Stores</text>
  <text x="957" y="358" class="small">JSON rules, queues, runs</text>

  <rect x="360" y="485" width="230" height="90" class="box"/>
  <text x="388" y="518" class="label">Dianxiaomi Pages</text>
  <text x="388" y="542" class="small">collection, edit, wait-publish</text>

  <rect x="650" y="485" width="230" height="90" class="box"/>
  <text x="678" y="518" class="label">DXM Automation V1</text>
  <text x="678" y="542" class="small">readonly preflight and dry-run</text>

  <polygon points="1015,476 1115,530 1015,584 915,530" class="gate"/>
  <text x="966" y="525" class="label">Explicit</text>
  <text x="973" y="548" class="label">Live Gate?</text>

  <rect x="930" y="120" width="210" height="82" class="stop"/>
  <text x="958" y="154" class="label">Stop / Report</text>
  <text x="958" y="178" class="small">no authorization or blockers</text>

  <rect x="930" y="585" width="210" height="64" class="ok"/>
  <text x="957" y="615" class="label">Save + Readback</text>
  <text x="957" y="637" class="small">wait-publish only</text>

  <path d="M250 171 H300" class="line"/>
  <path d="M415 212 V300" class="line"/>
  <path d="M300 345 H360" class="line"/>
  <path d="M590 345 H650" class="line"/>
  <path d="M880 345 H930" class="line"/>
  <path d="M765 390 V485" class="line"/>
  <path d="M590 530 H650" class="line"/>
  <path d="M880 530 H915" class="line"/>
  <path d="M1015 476 V202" class="dash"/>
  <path d="M1035 584 V585" class="line"/>
  <path d="M530 171 H930" class="dash"/>
  <text x="930" y="248" class="small">publish and one-click publish blocked</text>
</svg>
